name: "Branch coverage"
on:
  push:
    branches:
      - main
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]

permissions: read-all

jobs:
  branch-cov:
    runs-on: ubuntu-latest
    name: coverage
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          cache: false
          check-latest: true
          go-version: 1.26.x
      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          sudo apt-get update
          mkdir -p test/data
          cd test/data
          ../scripts/gen_certs.sh
          htpasswd -bBn test test123 > htpasswd
          go install github.com/rillig/gobco@latest
      - name: Check for branch coverage
        continue-on-error: true
        run: |
          cd $GITHUB_WORKSPACE
          for i in $(find . -type f \( -name "*.go" -not -name "*_test.go" -not -name "generated.go" \)); do
            echo $i;
            gobco -test '-tags=sync,search,scrub,metrics' $i;
            gobco -test $i;
          done

