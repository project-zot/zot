on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
name: build

permissions: read-all

jobs:
  build-arch:
    name: Build ZOT multiarch
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, freebsd, windows]
        arch: [amd64, arm64]
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Install go
        uses: actions/setup-go@v6
        with:
          cache: false
          check-latest: true
          go-version: 1.25.x
      - name: Cache go dependencies
        id: cache-go-dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-
      - name: Cache go build output
        id: cache-go-build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
          key: ${{ matrix.os }}-${{ matrix.arch }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.arch }}-go-build-
      - name: Install go dependencies
        if: steps.cache-go-dependencies.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE
          go mod download
      - name: Install other dependencies
        run: |
          cd $GITHUB_WORKSPACE
          go install github.com/swaggo/swag/cmd/swag@v1.16.2
          sudo apt-get update
          sudo apt-get install rpm
          sudo apt-get install snapd
          sudo apt-get install libgpgme-dev libassuan-dev libbtrfs-dev libdevmapper-dev pkg-config
          git clone https://github.com/containers/skopeo -b v1.12.0 $GITHUB_WORKSPACE/src/github.com/containers/skopeo
          cd $GITHUB_WORKSPACE/src/github.com/containers/skopeo && \
            make bin/skopeo && \
            sudo cp bin/skopeo /usr/bin && \
            rm -rf $GITHUB_WORKSPACE/src/github.com/containers/skopeo
          cd $GITHUB_WORKSPACE
          curl -Lo notation.tar.gz https://github.com/notaryproject/notation/releases/download/v1.0.0-rc.4/notation_1.0.0-rc.4_linux_amd64.tar.gz
          sudo tar xvzf notation.tar.gz -C /usr/bin notation
          rm -f notation.tar.gz
      - name: Run build
        timeout-minutes: 10
        run: |
          echo "Building for $OS:$ARCH"
          cd $GITHUB_WORKSPACE
          make binary binary-minimal binary-debug cli bench exporter-minimal
        env:
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}

      - name: Generate GraphQL Introspection JSON on Release
        if: github.event_name == 'release' && github.event.action == 'published' && matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          bin/zot-linux-amd64 serve examples/config-search.json &
          sleep 10
          curl -X POST -H "Content-Type: application/json" -d @.pkg/debug/githubWorkflows/introspection-query.json http://localhost:5000/v2/_zot/ext/search | jq > bin/zot-gql-introspection-result.json
          pkill zot

      - name: Output Config JSON Schema on Release
        if: github.event_name == 'release' && github.event.action == 'published' && matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          bin/zot-linux-amd64 schema -o json > bin/zot-config-schema.json

      - if: github.event_name == 'release' && github.event.action == 'published'
        name: Publish artifacts on releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bin/z*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

  submit-schemastore-pr:
    name: Submit Config Schema to SchemaStore
    needs: build-arch
    if: github.event_name == 'release' && github.event.action == 'published' && !contains(github.event.release.tag_name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Install go
        uses: actions/setup-go@v6
        with:
          cache: false
          check-latest: true
          go-version: 1.25.x
      - name: Cache go dependencies
        id: cache-go-dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-
      - name: Install go dependencies
        if: steps.cache-go-dependencies.outputs.cache-hit != 'true'
        run: go mod download
      - name: Build zot binary
        run: make binary
        env:
          OS: linux
          ARCH: amd64
      - name: Output Config JSON Schema
        run: |
          TAG=${{ github.event.release.tag_name }}
          VERSION=${TAG#v}
          bin/zot-linux-amd64 schema -o json > "zot-${VERSION}.json"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
      - name: Fork, branch, and submit PR to SchemaStore
        env:
          GH_TOKEN: ${{ secrets.SCHEMASTORE_PAT }}
        run: |
          SCHEMA_FILE="zot-${VERSION}.json"
          BRANCH="add-zot-schema-${VERSION}"

          # Fork (no-op if already forked) and clone SchemaStore
          gh repo fork SchemaStore/schemastore --clone
          cd schemastore

          git config user.name 'github-actions'
          git config user.email 'github-actions@users.noreply.github.com'
          git checkout -b "$BRANCH"

          # Copy versioned schema file
          cp "../${SCHEMA_FILE}" "src/schemas/json/${SCHEMA_FILE}"

          # Add/update the catalog.json entry for zot
          jq --arg version "$VERSION" \
             --arg url "https://json.schemastore.org/zot-${VERSION}.json" \
            'if any(.schemas[]; .name == "zot config") then
               .schemas |= map(
                 if .name == "zot config" then
                   .url = $url |
                   .versions[$version] = $url
                 else . end)
             else
               .schemas += [{
                 "name": "zot config",
                 "description": "Configuration file for the zot OCI container registry",
                 "fileMatch": ["zot-config.json"],
                 "url": $url,
                 "versions": {($version): $url}
               }]
             end' \
            src/api/json/catalog.json > catalog.tmp && mv catalog.tmp src/api/json/catalog.json

          git add "src/schemas/json/${SCHEMA_FILE}" src/api/json/catalog.json
          git commit -m "Add zot config schema ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --repo SchemaStore/schemastore \
            --title "Add zot config schema ${VERSION}" \
            --body "Add JSON schema for the [zot](https://github.com/project-zot/zot) OCI container registry configuration, version ${VERSION}." \
            --head "${GITHUB_REPOSITORY_OWNER}:${BRANCH}"

  release-checksums:
    name: Release Artifact Checksums
    needs: build-arch
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download Release Artifacts
        uses: robinraju/release-downloader@v1.12
        with:
          tag: ${{ github.ref_name }}
          fileName: "z*"
      - name: Generate checksum
        uses: jmgilman/actions-generate-checksum@v1
        with:
          patterns: z*
          method: sha256
          output: checksums.sha256.txt
      - name: Add wildcard character prefix to filenames in checksum file
        run: sed -i 's! ! \*!g' checksums.sha256.txt
      - name: Publish checksums on releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: checksums.sha256.txt
          tag: ${{ github.ref }}
          overwrite: true
